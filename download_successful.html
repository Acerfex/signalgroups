<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Erfolgreich</title>

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">

<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f4f8;
    font-family: Arial, sans-serif;
    margin: 0;
  }

  .checkmark {
    font-size: 5rem;
    color: #28a745;
    opacity: 0;
    transform: translateY(50px) scale(0);
    animation: pop 0.6s forwards;
  }

  @keyframes pop {
    0% {
      opacity: 0;
      transform: translateY(50px) scale(0);
    }
    60% {
      opacity: 1;
      transform: translateY(-10px) scale(1.2);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .message {
    margin-top: 20px;
    font-size: 1.5rem;
    color: #333;
    text-align: center;
  }
  button {
    padding: 14px 34px;
    font-size: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37,99,235,0.3);
    }
</style>
</head>
<body>

<div class="checkmark">✓</div>
<div class="message">
  <h1>SignalGroups erfolgreich heruntergeladen.</h1>
  <t>Du findest die APK in deinem Download-Ordner zum Ausführen.</t>
  <br><br>
  <button onclick="window.location.href='index.html'">Zurück zur Startseite</button>
  <br><br>
  <h5>© AcerFex Inc.</h5>
</div>



</body>
</html>
